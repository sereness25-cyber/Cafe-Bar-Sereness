<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>記事詳細 | Cafe & Bar セレネス</title>
    <style>
        :root { --primary-bg: #FAFAFA; --text-main: #333333; --accent-color: #A68B5B; }
        body { font-family: "Noto Serif JP", serif; color: var(--text-main); background-color: var(--primary-bg); line-height: 1.8; margin: 0; padding: 0; }
        header { background-color: var(--text-main); color: #fff; padding: 20px; text-align: center; letter-spacing: 0.1em; display: flex; justify-content: space-between; align-items: center;}
        header a { color: var(--accent-color); text-decoration: none; font-size: 0.9em; }
        .container { max-width: 800px; margin: 40px auto; padding: 40px; background: white; border-top: 3px solid var(--accent-color); box-shadow: 0 4px 15px rgba(0,0,0,0.03); }
        .news-date { color: var(--accent-color); font-size: 0.9em; letter-spacing: 0.05em; margin-bottom: 10px; display: block; }
        h1 { font-size: 1.6em; margin-top: 0; padding-bottom: 20px; border-bottom: 1px solid #eee; margin-bottom: 30px; }
        
        /* 記事内画像用のスタイル */
        .article-image { max-width: 100%; height: auto; border-radius: 4px; margin-bottom: 30px; display: block; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        
        .news-content { font-size: 1em; color: #444; white-space: pre-wrap; }
        .loading { text-align: center; color: #666; }
        
        /* 戻るボタン */
        .btn-back { display: inline-block; margin-top: 40px; color: var(--text-main); text-decoration: none; border: 1px solid #ccc; padding: 10px 20px; border-radius: 2px; transition: all 0.3s; }
        .btn-back:hover { background-color: #f5f5f5; border-color: var(--text-main); }
    </style>
</head>
<body>

    <header>
        <div style="width: 60px;"></div>
        <div>Cafe & Bar セレネス</div>
        <a href="index.html" style="width: 60px; text-align: right;">Topへ</a>
    </header>

    <div class="container" id="news-container">
        <p class="loading">記事を読み込み中...</p>
    </div>

<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbzQRAhDa8-BhxaB6IqsQ-hTmkAYLlu_x-5VK44U20hibIarUrgLSGz7wmZDgPgFsQKD6g/exec";

    const urlParams = new URLSearchParams(window.location.search);
    const targetId = urlParams.get('id');
    const container = document.getElementById('news-container');

    fetch(GAS_URL)
        .then(response => response.json())
        .then(data => {
            // NewsとBlogの両方のデータから該当するIDの記事を探す
            let article = data.news.find(item => item.id === targetId);
            if (!article) {
                article = data.blog.find(item => item.id === targetId);
            }
            
            if (article) {
                // 画像URLが存在する場合は、imgタグを生成
                const imageHtml = article.image ? `<img src="${article.image}" alt="記事画像" class="article-image">` : '';
                
                container.innerHTML = `
                    <span class="news-date">${article.date}</span>
                    <h1>${article.title}</h1>
                    ${imageHtml}
                    <div class="news-content">${article.content}</div>
                    <a href="index.html" class="btn-back">トップページへ戻る</a>
                `;
            } else {
                container.innerHTML = `<p>指定された記事は見つかりませんでした。</p><a href="index.html" class="btn-back">トップページへ戻る</a>`;
            }
        })
        .catch(err => {
            container.innerHTML = `<p>記事の読み込みに失敗しました。</p><a href="index.html" class="btn-back">トップページへ戻る</a>`;
        });
</script>

</body>
</html>
