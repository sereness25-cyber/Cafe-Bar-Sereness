<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>【管理画面】セレネス統合管理</title>
    <style>
        body { font-family: sans-serif; background-color: #f4f4f4; padding: 20px; color: #333; }
        .admin-box { background: #fff; max-width: 700px; margin: 0 auto 40px; padding: 30px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        h1 { font-size: 1.2em; border-bottom: 2px solid #A68B5B; padding-bottom: 10px; margin-bottom: 20px; }
        
        .tab-wrapper { display: flex; gap: 5px; margin-bottom: 20px; flex-wrap: wrap;}
        .tab-btn { flex: 1; padding: 10px; border: 1px solid #A68B5B; background: white; color: #A68B5B; cursor: pointer; border-radius: 4px; font-weight: bold; font-size: 0.9em;}
        .tab-btn.active { background: #A68B5B; color: white; }
        
        label { display: block; margin-top: 15px; font-weight: bold; font-size: 0.85em; }
        select, input, textarea { width: 100%; padding: 10px; margin-top: 5px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        
        .btn-primary { background-color: #A68B5B; color: white; border: none; padding: 12px; margin-top: 20px; width: 100%; border-radius: 4px; cursor: pointer; font-weight: bold; }
        .btn-danger { background-color: #d9534f; color: white; border: none; padding: 12px; margin-top: 10px; width: 100%; border-radius: 4px; cursor: pointer; font-weight: bold; }
        
        .menu-list-area { margin-top: 30px; border-top: 2px solid #eee; padding-top: 20px; }
        
        .filter-container { display: flex; gap: 10px; margin-bottom: 15px; background: #f9f9f9; padding: 10px; border-radius: 4px; border: 1px solid #ddd; flex-wrap: wrap;}
        .filter-container input, .filter-container select { margin-top: 0; padding: 8px; font-size: 0.85em; flex: 1; min-width: 120px;}
        
        .table-wrapper { max-height: 400px; overflow-y: auto; border: 1px solid #ccc; border-radius: 4px; }
        .admin-table { width: 100%; border-collapse: collapse; font-size: 0.85em; }
        .admin-table th, .admin-table td { border-bottom: 1px solid #eee; padding: 10px; text-align: left; vertical-align: middle; }
        .admin-table th { background: #eee; position: sticky; top: 0; z-index: 1; font-weight: bold; }
        .admin-table tr:hover { background-color: #fcfcfc; }
        
        .btn-group { display: flex; gap: 5px; }
        .btn-move { background: #f0ad4e; color: white; border: none; padding: 6px 10px; border-radius: 3px; cursor: pointer; font-size: 0.85em; }
        .btn-move:disabled { background: #ccc; cursor: not-allowed; }
        .edit-btn { background: #5cb85c; color: white; border: none; padding: 6px 10px; border-radius: 3px; cursor: pointer; font-size: 0.85em; }
        .del-btn-small { background: #d9534f; color: white; border: none; padding: 6px 10px; border-radius: 3px; cursor: pointer; font-size: 0.85em; }
        /* ▼ コピーボタン用のスタイルを追加 ▼ */
        .copy-btn { background: #5bc0de; color: white; border: none; padding: 6px 10px; border-radius: 3px; cursor: pointer; font-size: 0.85em; }
        
        #message { margin-top: 15px; text-align: center; font-weight: bold; }
        
        .badge-day { background: #f0ad4e; color: #fff; padding: 2px 6px; border-radius: 3px; font-size: 0.8em; }
        .badge-night { background: #5b7da6; color: #fff; padding: 2px 6px; border-radius: 3px; font-size: 0.8em; }
        .badge-blog { background: #7c5ba6; color: #fff; padding: 2px 6px; border-radius: 3px; font-size: 0.8em; }
        .badge-news { background: #5ba68c; color: #fff; padding: 2px 6px; border-radius: 3px; font-size: 0.8em; }
        .badge-image { background: #666; color: #fff; padding: 2px 6px; border-radius: 3px; font-size: 0.7em; margin-left: 5px; }
        
        .text-preview { max-width: 150px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; display: inline-block; color: #666; font-size: 0.9em; }
        
        .file-upload-wrapper { margin-top: 15px; border: 1px dashed #ccc; padding: 15px; border-radius: 4px; background: #fafafa; }
        .file-note { font-size: 0.8em; color: #888; margin-top: 5px; display: block; }
    </style>
</head>
<body>

<div class="admin-box">
    <h1>セレネス 管理画面</h1>
    <div class="tab-wrapper">
        <button class="tab-btn active" onclick="switchTab('article')">記事投稿</button>
        <button class="tab-btn" onclick="switchTab('menu')">メニュー管理</button>
        <button class="tab-btn" onclick="switchTab('calendar')">カレンダー管理</button>
    </div>

    <form id="postForm">
        <div id="article-section">
            <input type="hidden" id="oldArticleTitle"> 
            <label>投稿先</label>
            <select id="type"><option value="blog">ブログ</option><option value="news">News</option></select>
            <label>日付</label><input type="date" id="date">
            <label>タイトル</label><input type="text" id="title">
            <label>本文</label><textarea id="content" rows="4"></textarea>
            
            <div class="file-upload-wrapper">
                <label style="margin-top: 0;">画像（任意）</label>
                <input type="file" id="imageFile" accept="image/*" style="border: none; padding: 0;">
                <label style="margin-top: 15px; display: flex; align-items: center; gap: 5px; cursor: pointer;">
                    <input type="checkbox" id="showImage" checked style="width: auto; margin: 0; cursor: pointer;"> 
                    <span>サムネイル画像を表示する</span>
                </label>
                <span class="file-note">※編集時に新しい画像を選択すると上書きされます。<br>※画像を消したい場合はチェックを外して保存してください。</span>
            </div>
        </div>

        <div id="menu-section" style="display: none;">
            <label>昼夜の区分</label>
            <select id="timeMode"><option value="day">昼 (Cafe)</option><option value="night">夜 (Bar)</option></select>
            <label>カテゴリ</label>
            <select id="menuCategory">
                <option value="飲み放題">飲み放題</option>
                <option value="コーヒー">コーヒー</option>
                <option value="スペシャルドリンク">スペシャルドリンク</option>
                <option value="アルコール">アルコール</option>
                <option value="ソフトドリンク">ソフトドリンク</option>
                <option value="フード">フード</option>
                <option value="缶">缶</option>
                <option value="おつまみ">おつまみ</option>
                <option disabled>──────────</option>
                <option value="クラフトStep1">クラフトメニュー: Step 1</option>
                <option value="クラフトStep2">クラフトメニュー: Step 2</option>
                <option value="クラフトStep3">クラフトメニュー: Step 3</option>
            </select>
            <label>商品名</label><input type="text" id="menuName">
            <label>金額（例: 500円）</label><input type="text" id="menuPrice">
            <label>簡単な説明</label><input type="text" id="menuDesc">
        </div>

        <div id="calendar-section" style="display: none;">
            <input type="hidden" id="oldCalDate">
            <input type="hidden" id="oldCalType">
            <input type="hidden" id="oldCalNote">
            
            <label>予定日</label>
            <input type="date" id="calDate">
            <label>区分</label>
            <select id="calType">
                <option value="通常営業">通常営業</option>
                <option value="休業日">休業日 (定休日など)</option>
                <option value="イベント">イベント</option>
                <option value="貸切">貸切</option>
                <option value="短縮営業">短縮営業</option>
            </select>
            <label>詳細・備考（任意）</label>
            <input type="text" id="calNote" placeholder="例：18時オープン、〇〇パーティ開催 等">
        </div>

        <button type="submit" class="btn-primary" id="submitBtn">保存・更新する</button>
        <div id="message"></div>
    </form>

    <div id="list-container" class="menu-list-area">
        <h3 id="list-title">登録済み一覧</h3>
        
        <div id="article-filter-area" class="filter-container">
            <select id="filterArticleType" onchange="renderArticleList()">
                <option value="all">すべての投稿</option>
                <option value="blog">ブログ</option>
                <option value="news">News</option>
            </select>
        </div>

        <div id="menu-filter-area" class="filter-container" style="display: none;">
            <input type="text" id="searchMenu" placeholder="商品名で検索..." oninput="renderMenuList()">
            <select id="filterTime" onchange="renderMenuList()">
                <option value="all">昼/夜 すべて</option>
                <option value="day">昼 (Cafe)</option>
                <option value="night">夜 (Bar)</option>
            </select>
            <select id="filterCat" onchange="renderMenuList()">
                <option value="all">全カテゴリ</option>
                <option value="飲み放題">飲み放題</option>
                <option value="コーヒー">コーヒー</option>
                <option value="スペシャルドリンク">スペシャルドリンク</option>
                <option value="アルコール">アルコール</option>
                <option value="ソフトドリンク">ソフトドリンク</option>
                <option value="フード">フード</option>
                <option value="缶">缶</option>
                <option value="おつまみ">おつまみ</option>
                <option value="クラフトStep1">クラフト Step1</option>
                <option value="クラフトStep2">クラフト Step2</option>
                <option value="クラフトStep3">クラフト Step3</option>
            </select>
        </div>

        <div id="listItems">データを読み込んでいます...</div>
    </div>
</div>

<script>
    const GAS_URL = "https://script.google.com/macros/s/AKfycbzQRAhDa8-BhxaB6IqsQ-hTmkAYLlu_x-5VK44U20hibIarUrgLSGz7wmZDgPgFsQKD6g/exec";
    
    let currentMode = 'article';
    let allData = { article: [], menu: [], calendar: [] };
    let filteredMenuList = []; 

    window.onload = () => { loadData(); };

    function switchTab(mode) {
        currentMode = mode;
        const tabs = document.querySelectorAll('.tab-btn');
        tabs[0].classList.toggle('active', mode === 'article');
        tabs[1].classList.toggle('active', mode === 'menu');
        tabs[2].classList.toggle('active', mode === 'calendar');
        
        document.getElementById('article-section').style.display = mode === 'article' ? 'block' : 'none';
        document.getElementById('menu-section').style.display = mode === 'menu' ? 'block' : 'none';
        document.getElementById('calendar-section').style.display = mode === 'calendar' ? 'block' : 'none';
        
        document.getElementById('article-filter-area').style.display = mode === 'article' ? 'flex' : 'none';
        document.getElementById('menu-filter-area').style.display = mode === 'menu' ? 'flex' : 'none';
        
        document.getElementById('postForm').reset();
        document.getElementById('oldArticleTitle').value = ""; 
        document.getElementById('oldCalDate').value = ""; 
        document.getElementById('oldCalType').value = ""; 
        document.getElementById('oldCalNote').value = ""; 
        document.getElementById('imageFile').value = ""; 
        document.getElementById('showImage').checked = true; 
        
        if(mode === 'article') renderArticleList();
        else if(mode === 'menu') renderMenuList();
        else if(mode === 'calendar') renderCalendarList();
    }

    function loadData() {
        const container = document.getElementById('listItems');
        container.innerHTML = '読み込み中...';
        
        fetch(GAS_URL).then(res => res.json()).then(data => {
            let combinedArticles = [];
            if(data.news) { data.news.forEach(n => { n.type = 'news'; combinedArticles.push(n); }); }
            if(data.blog) { data.blog.forEach(b => { b.type = 'blog'; combinedArticles.push(b); }); }
            
            allData = { article: combinedArticles, menu: data.menu || [], calendar: data.calendar || [] };
            if(allData.menu) allData.menu.forEach((m, idx) => m._originalIndex = idx);
            if(allData.article) allData.article.forEach((a, idx) => a._originalIndex = idx);

            switchTab(currentMode);
        }).catch(err => { container.innerHTML = '読み込み失敗'; });
    }

    function renderArticleList() {
        const container = document.getElementById('listItems');
        document.getElementById('list-title').textContent = "投稿済み記事一覧";
        if(!allData.article || allData.article.length === 0) { container.innerHTML = '<div style="text-align:center; padding: 20px; color: #666;">投稿された記事はありません。</div>'; return; }

        const filterType = document.getElementById('filterArticleType').value;
        const filteredArticles = allData.article.filter(a => { return (filterType === 'all') || (a.type === filterType); });
        if (filteredArticles.length === 0) { container.innerHTML = '<div style="text-align:center; padding: 20px; color: #666;">該当する記事がありません。</div>'; return; }

        let html = '<div class="table-wrapper"><table class="admin-table"><thead><tr><th>区分</th><th>日付</th><th>タイトル・本文</th><th>操作</th></tr></thead><tbody>';
        filteredArticles.forEach(a => {
            const badge = a.type === 'news' ? '<span class="badge-news">News</span>' : '<span class="badge-blog">ブログ</span>';
            const imgBadge = a.image ? '<span class="badge-image">📷画像あり</span>' : '';
            const preview = a.content ? a.content.replace(/\n/g, ' ').substring(0, 30) + '...' : '';
            html += `<tr><td>${badge}</td><td>${a.date}</td><td><strong>${a.title}</strong> ${imgBadge}<br><span class="text-preview">${preview}</span></td><td><div class="btn-group"><button type="button" class="edit-btn" onclick="editArticle(${a._originalIndex})">編集</button><button type="button" class="del-btn-small" onclick="deleteArticle('${a.title}')">削除</button></div></td></tr>`;
        });
        html += '</tbody></table></div>';
        container.innerHTML = html;
    }
    function editArticle(index) {
        const a = allData.article[index];
        document.getElementById('type').value = a.type || 'blog';
        if(a.date) document.getElementById('date').value = a.date.replace(/\./g, '-');
        document.getElementById('title').value = a.title;
        document.getElementById('content').value = a.content;
        document.getElementById('oldArticleTitle').value = a.title;
        document.getElementById('imageFile').value = "";
        document.getElementById('showImage').checked = a.image ? true : false;
        window.scrollTo({ top: 0, behavior: 'smooth' });
        document.getElementById('message').style.color = "blue"; document.getElementById('message').textContent = "記事編集モード：保存すると上書きされます";
    }
    function deleteArticle(title) {
        if(!confirm(`「${title}」の記事を削除しますか？`)) return;
        sendData({ type: "article_delete", title: title });
    }

    function renderMenuList() {
        const container = document.getElementById('listItems');
        document.getElementById('list-title').textContent = "登録済みメニュー一覧";
        if(!allData.menu || allData.menu.length === 0) { container.innerHTML = '登録されたメニューはありません。'; return; }

        const searchQuery = document.getElementById('searchMenu').value.toLowerCase();
        const filterTime = document.getElementById('filterTime').value;
        const filterCat = document.getElementById('filterCat').value;

        filteredMenuList = allData.menu.filter(m => {
            const matchSearch = m.name.toLowerCase().includes(searchQuery);
            const matchTime = (filterTime === 'all') || (m.timeMode === filterTime);
            const matchCat = (filterCat === 'all') || (m.category === filterCat);
            return matchSearch && matchTime && matchCat;
        });
        if (filteredMenuList.length === 0) { container.innerHTML = '<div style="text-align:center; padding: 20px; color: #666;">該当するメニューが見つかりません。</div>'; return; }

        let html = '<div class="table-wrapper"><table class="admin-table"><thead><tr><th>昼/夜</th><th>カテゴリ</th><th>商品名</th><th>金額</th><th>操作</th></tr></thead><tbody>';
        filteredMenuList.forEach((m, i) => {
            const badge = m.timeMode === 'day' ? '<span class="badge-day">昼</span>' : '<span class="badge-night">夜</span>';
            const isFirst = (i === 0); const isLast = (i === filteredMenuList.length - 1);
            html += `<tr><td>${badge}</td><td>${m.category}</td><td><strong>${m.name}</strong></td><td>${m.price || '-'}</td><td><div class="btn-group"><button type="button" class="btn-move" onclick="moveMenu(${m._originalIndex}, -1)" ${isFirst ? 'disabled' : ''}>▲</button><button type="button" class="btn-move" onclick="moveMenu(${m._originalIndex}, 1)" ${isLast ? 'disabled' : ''}>▼</button><button type="button" class="edit-btn" onclick="editMenu(${m._originalIndex})">編集</button><button type="button" class="del-btn-small" onclick="deleteMenu('${m.name}', '${m.timeMode}')">削除</button></div></td></tr>`;
        });
        html += '</tbody></table></div>';
        container.innerHTML = html;
    }
    function moveMenu(originalIndex, direction) {
        const currentPos = filteredMenuList.findIndex(m => m._originalIndex === originalIndex);
        if (currentPos === -1) return;
        const targetOriginalIndex = filteredMenuList[currentPos + direction]._originalIndex;
        const temp = allData.menu[originalIndex];
        allData.menu[originalIndex] = allData.menu[targetOriginalIndex];
        allData.menu[targetOriginalIndex] = temp;
        allData.menu.forEach((m, idx) => m._originalIndex = idx);
        renderMenuList();
        const msg = document.getElementById('message'); msg.style.color = "blue"; msg.textContent = "並び順を保存中...";
        fetch(GAS_URL, { method: 'POST', body: JSON.stringify({ type: "menu_reorder", menuData: allData.menu }) })
        .then(res => res.json()).then(res => { if (res.status === "success") { msg.style.color = "green"; msg.textContent = "並び順を更新しました！"; } else { msg.style.color = "red"; msg.textContent = "保存中にエラーが発生しました"; } });
    }
    function editMenu(index) {
        const m = allData.menu[index];
        document.getElementById('timeMode').value = m.timeMode;
        let cat = m.category; if(cat === '単品ドリンク') cat = 'アルコール'; 
        document.getElementById('menuCategory').value = cat;
        document.getElementById('menuName').value = m.name;
        document.getElementById('menuPrice').value = m.price;
        document.getElementById('menuDesc').value = m.description || "";
        window.scrollTo({ top: 0, behavior: 'smooth' });
        document.getElementById('message').style.color = "blue"; document.getElementById('message').textContent = "メニュー編集モード：保存すると上書きされます";
    }
    function deleteMenu(name, timeMode) {
        if(!confirm(name + ' を削除しますか？')) return;
        sendData({ type: "menu_delete", name: name, timeMode: timeMode });
    }

    // --- カレンダー関連の関数 ---
    function renderCalendarList() {
        const container = document.getElementById('listItems');
        document.getElementById('list-title').textContent = "登録済みカレンダー予定";

        if(!allData.calendar || allData.calendar.length === 0) { 
            container.innerHTML = '<div style="text-align:center; padding: 20px; color: #666;">予定の登録はありません。</div>'; 
            return; 
        }
        
        container.innerHTML = '';
        let calArray = allData.calendar.sort((a,b) => new Date(a.date) - new Date(b.date));
        calArray.forEach(c => {
            const div = document.createElement('div');
            div.style.borderBottom = "1px solid #ccc";
            div.style.padding = "10px";
            div.style.display = "flex";
            div.style.justifyContent = "space-between";
            div.innerHTML = `
                <div><strong>${c.date}</strong><br><span style="color:#d9534f; font-weight:bold; font-size:0.9em;">${c.type}</span> <small>${c.note||''}</small></div>
                <div class="btn-group">
                    <button type="button" class="copy-btn" onclick="copyCalendar('${c.date}', '${c.type}', '${c.note}')">コピー</button>
                    <button type="button" class="edit-btn" onclick="editCalendar('${c.date}', '${c.type}', '${c.note}')">編集</button>
                    <button type="button" class="del-btn-small" onclick="deleteCalendar('${c.date}', '${c.type}', '${c.note}')">削除</button>
                </div>`;
            container.appendChild(div);
        });
    }

    // ▼ 新規追加：カレンダーのコピー機能 ▼
    function copyCalendar(date, type, note) {
        document.getElementById('calDate').value = date;
        document.getElementById('calType').value = type;
        document.getElementById('calNote').value = note || "";
        
        // コピーなので「上書き用の過去データ」は空っぽ（リセット）にする
        document.getElementById('oldCalDate').value = "";
        document.getElementById('oldCalType').value = "";
        document.getElementById('oldCalNote').value = "";
        
        window.scrollTo({ top: 0, behavior: 'smooth' });
        document.getElementById('message').style.color = "blue";
        document.getElementById('message').textContent = "予定をコピーしました！日付などを変更して保存してください。";
    }

    function editCalendar(date, type, note) {
        document.getElementById('calDate').value = date;
        document.getElementById('calType').value = type;
        document.getElementById('calNote').value = note || "";
        
        document.getElementById('oldCalDate').value = date;
        document.getElementById('oldCalType').value = type;
        document.getElementById('oldCalNote').value = note || "";
        
        window.scrollTo({ top: 0, behavior: 'smooth' });
        document.getElementById('message').style.color = "blue";
        document.getElementById('message').textContent = "カレンダー編集モード：保存すると上書きされます";
    }

    function deleteCalendar(d, type, note) {
        if(!confirm(`${d} の「${type}」の予定を削除しますか？`)) return;
        sendData({ type: "calendar", action: "delete", date: d, calType: type, note: note });
    }

    // --- データ送信処理 ---
    document.getElementById('postForm').addEventListener('submit', function(e) {
        e.preventDefault();
        const btn = document.getElementById('submitBtn');
        const msg = document.getElementById('message');
        
        if (currentMode === 'article') {
            const rawDate = document.getElementById('date').value;
            let payload = { 
                type: "article_save", 
                articleType: document.getElementById('type').value, 
                date: rawDate ? rawDate.replace(/-/g, '.') : "", 
                title: document.getElementById('title').value, 
                content: document.getElementById('content').value,
                oldTitle: document.getElementById('oldArticleTitle').value,
                showImage: document.getElementById('showImage').checked 
            };
            const fileInput = document.getElementById('imageFile');
            if (fileInput.files.length > 0) {
                msg.style.color = "blue"; msg.textContent = "画像をアップロード中...（少し時間がかかります）";
                btn.disabled = true;
                const file = fileInput.files[0];
                const reader = new FileReader();
                reader.onload = function(event) {
                    payload.image = event.target.result; payload.mimeType = file.type; payload.filename = file.name;
                    sendData(payload);
                };
                reader.readAsDataURL(file);
            } else {
                sendData(payload);
            }
        } else if (currentMode === 'menu') {
            let payload = { type: "menu", timeMode: document.getElementById('timeMode').value, category: document.getElementById('menuCategory').value, name: document.getElementById('menuName').value, price: document.getElementById('menuPrice').value, description: document.getElementById('menuDesc').value };
            sendData(payload);
        } else if (currentMode === 'calendar') {
            const d = document.getElementById('calDate').value;
            if(!d) { alert("日付を入力してください"); return; }
            let payload = { 
                type: "calendar", action: "save", 
                date: d, 
                calType: document.getElementById('calType').value, 
                note: document.getElementById('calNote').value,
                oldCalDate: document.getElementById('oldCalDate').value,
                oldCalType: document.getElementById('oldCalType').value,
                oldNote: document.getElementById('oldCalNote').value
            };
            sendData(payload);
        }
    });

    function sendData(payload) {
        const btn = document.getElementById('submitBtn');
        const msg = document.getElementById('message');
        btn.disabled = true; 
        if(msg.textContent !== "画像をアップロード中...（少し時間がかかります）") { msg.style.color = "blue"; msg.textContent = "処理中..."; }
        
        fetch(GAS_URL, { method: 'POST', body: JSON.stringify(payload) })
        .then(res => res.json()).then(res => {
            if (res.status === "success") {
                msg.style.color = "green"; msg.textContent = "完了しました！";
                document.getElementById('postForm').reset();
                if(currentMode === 'article') {
                    document.getElementById('oldArticleTitle').value = ""; document.getElementById('imageFile').value = ""; document.getElementById('showImage').checked = true;
                } else if(currentMode === 'calendar') {
                    document.getElementById('oldCalDate').value = ""; document.getElementById('oldCalType').value = ""; document.getElementById('oldCalNote').value = "";
                }
                loadData(); 
            } else { msg.style.color = "red"; msg.textContent = "エラーが発生しました"; }
        }).catch(err => { msg.style.color = "red"; msg.textContent = "通信エラーが発生しました";
        }).finally(() => { btn.disabled = false; btn.textContent = "保存・更新する"; });
    }
</script>
</body>
</html>
